<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Candidate Transformer" }}</title>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        wine: {
                            50: '#fdf2f4',
                            100: '#fbe6e9',
                            200: '#f7d0d6',
                            300: '#f0aab5',
                            400: '#e57a8e',
                            500: '#d44e6b',
                            600: '#be3353',
                            700: '#9f2441',
                            800: '#842037',
                            900: '#6f1d31',
                            950: '#3e0b16',
                        },
                        dark: {
                            50: '#f6f6f7',
                            100: '#eef0f2',
                            200: '#dbe0e5',
                            300: '#bdc6cf',
                            400: '#9aa7b5',
                            500: '#7e8e9e',
                            600: '#647384',
                            700: '#525e6d',
                            800: '#272d37',
                            900: '#0f1115',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Custom styling overriding browser defaults -->
    <style>
        body {
            background-color: #f8fafc; /* slate-50 background for clean tech workspace */
            color: #0f172a; /* slate-900 text */
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #be3353;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col antialiased">
    <!-- Navbar with Burgundy Accents & Glassmorphism -->
    <nav class="backdrop-blur-md bg-white/80 border-b border-slate-200/80 px-6 py-4 flex items-center justify-between sticky top-0 z-50 shadow-sm transition-all duration-300">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-wine-800 to-wine-600 flex items-center justify-center text-white font-black text-sm select-none shadow-md shadow-wine-900/10">CT</div>
            <div>
                <h1 class="text-lg font-bold tracking-tight text-slate-800 flex items-center gap-2">
                    Candidate Transformer
                    <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-wine-50 text-wine-700 border border-wine-100 uppercase tracking-wide">Pipeline Engine</span>
                </h1>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs font-semibold text-slate-500 tracking-wide uppercase">Eightfold Assignment</span>
            <div class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="flex-grow flex flex-col">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
